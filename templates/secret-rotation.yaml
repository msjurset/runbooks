name: secret-rotation
description: Rotate API keys and tokens using 1Password secret references

variables:
  - name: host
    prompt: "Server hostname or IP"
  - name: user
    default: "deploy"
  - name: api_token
    default: "op://Infrastructure/API-Service/token"
    secret: true
  - name: db_password
    default: "op://Infrastructure/Database/password"
    secret: true
  - name: service
    default: "api"

steps:
  - name: Verify secrets resolved
    type: shell
    shell:
      command: |
        if echo "{{.api_token}}" | grep -q "^op://"; then
          echo "ERROR: API token not resolved from 1Password"
          exit 1
        fi
        if echo "{{.db_password}}" | grep -q "^op://"; then
          echo "ERROR: Database password not resolved from 1Password"
          exit 1
        fi
        echo "All secrets resolved successfully"
    on_error: abort

  - name: Update API token on server
    type: ssh
    ssh:
      host: "{{.host}}"
      user: "{{.user}}"
      agent_auth: true
      command: |
        sudo tee /etc/myapp/api-token > /dev/null <<< "{{.api_token}}"
        sudo chmod 600 /etc/myapp/api-token
    on_error: abort

  - name: Update database credentials
    type: ssh
    ssh:
      host: "{{.host}}"
      user: "{{.user}}"
      agent_auth: true
      command: |
        sudo sed -i "s/DB_PASSWORD=.*/DB_PASSWORD={{.db_password}}/" /etc/myapp/env
        sudo chmod 600 /etc/myapp/env
    on_error: abort

  - name: Confirm restart
    confirm: "Restart {{.service}} on {{.host}} to apply new credentials?"

  - name: Restart service
    type: ssh
    ssh:
      host: "{{.host}}"
      user: "{{.user}}"
      agent_auth: true
      command: "sudo systemctl restart {{.service}}"
    timeout: 30s
    on_error: abort

  - name: Verify service healthy
    type: ssh
    ssh:
      host: "{{.host}}"
      user: "{{.user}}"
      agent_auth: true
      command: "sudo systemctl is-active {{.service}} && echo 'Service running'"
    timeout: 15s
    on_error: continue
